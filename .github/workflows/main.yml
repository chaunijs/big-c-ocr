name: OCR Test Pipeline

on:
  workflow_dispatch: 

jobs:
  test_ocr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        # Appended xlsxwriter to guarantee polars can write Excel files
        run: pip install -r requirements.txt xlsxwriter

      - name: Install Playwright & Patchright Browsers
        run: |
          playwright install chromium
          playwright install-deps
          patchright install chromium
          patchright install-deps

      - name: Run OCR Test Script
        run: python big_test_ocr.py

      # New step to save the output files so you can download them
      - name: Upload OCR Results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-results
          path: |
            ocr_results_*.xlsx
            ocr_results_*.csv
          retention-days: 7
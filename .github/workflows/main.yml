name: OCR Test Pipeline

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  test_ocr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Tesseract OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-tha

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright & Patchright Browsers
        run: |
          playwright install chromium
          playwright install-deps
          patchright install chromium
          patchright install-deps

      - name: Run OCR Test Script
        run: python big_test_ocr.py
